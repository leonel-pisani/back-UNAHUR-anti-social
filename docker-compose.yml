services:
  mongodb:
    image: mongo:4.4
    container_name: mongo_db_mongoose
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    restart: unless-stopped
    networks: 
      - app-net

  mongo-express:
    image: mongo-express
    container_name: mongo_express_ui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb
    restart: unless-stopped
    networks: 
      - app-net

  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-net 

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: redis_insight_ui
    ports:
      - "5540:5540"
    volumes:
      - redis_insight:/db
    depends_on: 
      - redis
    networks:
      - app-net 

volumes:
  mongo_data:
  redis-data:    
  redis_insight: 

networks:
  app-net:       
    driver: bridge